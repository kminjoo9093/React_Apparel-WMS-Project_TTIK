name: Deploy Frontend (Stable)

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, windows, react]

    env:
      DEPLOY_ROOT: C:\deploy\frontend
      RELEASE_DIR: C:\deploy\frontend\releases\${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Build React
        shell: cmd
        run: |
          set CI=false
          npm run build

      - name: Create Release Directory
        shell: cmd
        run: if not exist "%RELEASE_DIR%" mkdir "%RELEASE_DIR%"

      - name: Copy Build to Release
        shell: cmd
        run: xcopy build "%RELEASE_DIR%\build" /E /I /Y /Q

      - name: Atomic Deploy (Update current)
        shell: cmd
        run: |
          echo Deploying to current...
          robocopy "%RELEASE_DIR%\build" "%DEPLOY_ROOT%\current" /MIR /MT:4 /R:2 /W:2
          exit /b 0
