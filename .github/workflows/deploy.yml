# ==========================================
# React Frontend CI/CD 파이프라인 (안정화)
# ==========================================

name: Deploy Frontend

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: [self-hosted, windows, react]
    env:
      DEPLOY_ROOT: C:\deploy\frontend
      RELEASE_DIR: C:\deploy\frontend\releases\${{ github.run_id }}

    steps:
      # 1️⃣ 소스 체크아웃
      - name: Checkout source
        uses: actions/checkout@v4

      # 2️⃣ npm 캐시
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      # 3️⃣ Node.js 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 4️⃣ 의존성 설치
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # 5️⃣ React 빌드
      - name: Build React
        run: npm run build

      # 6️⃣ release 디렉토리 생성
      - name: Create release directory
        shell: cmd
        run: |
          if not exist "%RELEASE_DIR%" mkdir "%RELEASE_DIR%"

      # 7️⃣ build 결과 release로 복사
      - name: Copy build output to release
        shell: cmd
        run: |
          xcopy build "%RELEASE_DIR%\build" /E /I /Y

      # 8️⃣ 서버 종료 (current 폴더 사용 중이면 삭제 불가 방지)
      - name: Stop frontend server
        shell: cmd
        run: |
          echo Stopping existing React server...
          taskkill /F /IM node.exe /FI "WINDOWTITLE eq ReactServe*" >nul 2>&1

      # 9️⃣ current 디렉토리 교체 (안정화)
      - name: Switch current directory
        shell: cmd
        run: |
          echo Removing old current folder...
          if exist "%DEPLOY_ROOT%\current" (
            rmdir /s /q "%DEPLOY_ROOT%\current"
          )
          mkdir "%DEPLOY_ROOT%\current"
          xcopy "%RELEASE_DIR%\build" "%DEPLOY_ROOT%\current" /E /I /Y

      # 🔟 프론트엔드 서버 재시작
      - name: Restart frontend server
        shell: cmd
        run: |
          C:\deploy\scripts\restart-frontend.bat
