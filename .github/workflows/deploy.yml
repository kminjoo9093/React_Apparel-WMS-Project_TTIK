name: Deploy Frontend (Stable)

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: [self-hosted, windows, react]
    env:
      DEPLOY_ROOT: C:\deploy\frontend
      RELEASE_DIR: C:\deploy\frontend\releases\${{ github.run_id }}
      SERVE_CMD: C:\Users\user\AppData\Roaming\npm\serve.cmd
      PORT: 3000

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build React
        shell: pwsh
        run: |
          $env:CI="false"
          npm run build

      - name: Create release directory
        shell: cmd
        run: |
          if not exist "%RELEASE_DIR%" mkdir "%RELEASE_DIR%"

      - name: Copy build to release
        shell: cmd
        run: |
          xcopy build "%RELEASE_DIR%\build" /E /I /Y

      - name: Update current folder safely
        shell: cmd
        run: |
          echo Updating current folder safely...
          robocopy "%RELEASE_DIR%\build" "%DEPLOY_ROOT%\current" /MIR /MT:4 /R:2 /W:2
          exit /b 0
          echo Current folder updated!

      - name: Ensure React server is running
        shell: cmd
        run: |
          "C:\deploy\scripts\restart-frontend.bat"
